<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECH STORE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <header class="card-head">
      
      <h1>TECH STORE</h1>
    </header>
    <main class="card-main">
      <section class="main-item">
        <img src="m.jpg" alt="Mouse" class="product-image">
        <div class="product-info">
          <h2 class="product-name">Wireless Mouse</h2>
          <p class="product-price">Price : <span>৳1200</span></p>
          <p class="product-details">A lightweight wireless mouse with a rechargeable battery. It provides smooth control and comfortable use for everyday work.</p>
        </div>
      </section>

      
    </main>
  </div>
</body>
</html>
